name: Deploy backend to Hugging Face

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: GitHub 코드 가져오기
        uses: actions/checkout@v4

      - name: Hugging Face Space에 backend만 업로드
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git clone https://oauth2:$HF_TOKEN@huggingface.co/spaces/hyukjoo2/allthatask hf-space

          find hf-space -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          rsync -av backend/ hf-space/

          cd hf-space
          git add .
          git commit -m "auto deploy from github" || echo "No changes to commit"
          git push